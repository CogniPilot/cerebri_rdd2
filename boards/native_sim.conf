CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=y
CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_INPUT=y
CONFIG_INPUT_MODE_SYNCHRONOUS=y
CONFIG_SENSOR=y

CONFIG_ZENOH_PICO_SHELL=y
CONFIG_ZENOH_PICO_SHELL_MODE="client"
CONFIG_ZENOH_PICO_SHELL_CONNECT_LOCATOR="udp/127.0.0.1:7447"
CONFIG_ZENOH_PICO_SHELL_SUB_KEYEXPR="**"
CONFIG_ZENOH_PICO_SHELL_THREAD_PRIORITY=5
CONFIG_ZENOH_PICO_SHELL_THREAD_STACK_SIZE=4096
CONFIG_ZENOH_PICO_SHELL_RETRY_MS=1000
CONFIG_ZENOH_PICO_SHELL_MAX_PAYLOAD=512
CONFIG_ZENOH_PICO_SHELL_MAX_KEYEXPR=96

CONFIG_RDD2_LOG_SDCARD=y
CONFIG_DISK_DRIVERS=y
CONFIG_DISK_DRIVER_FLASH=y
CONFIG_FS_FATFS_MOUNT_MKFS=y
CONFIG_FILE_SYSTEM_SHELL=y

CONFIG_UART_NATIVE_PTY=y
CONFIG_UART_NATIVE_PTY_0_ON_OWN_PTY=y
CONFIG_UART_NATIVE_PTY_AUTOATTACH_DEFAULT_CMD="xterm -fa Monospace -fs 14 -e screen %s &"
