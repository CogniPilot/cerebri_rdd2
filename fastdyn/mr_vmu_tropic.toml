# ==============================================================================
#                      Cerebri RDD2 / MR-VMU-Tropic Rehosting
# ==============================================================================
[Rehosting]
[Rehosting.directories]
static_analysis_cache_dir = "./fastdyn_static_analysis_cerebri_rdd2"
firmware_source_roots = ["${RDD2_WORKSPACE_ROOT}"]
firmware_build_roots = [
    "${RDD2_FASTDYN_BUILD_DIR}",
]
modeling_dir = "boardrunner/boardrunner_sdk/model"

[Rehosting.static_analysis.macros]
enabled = false
strategy = "rebuild"
source_project_root = "${RDD2_WORKSPACE_ROOT}"
build_dir = "${RDD2_FASTDYN_BUILD_DIR}"
reuse_existing_build = true
allow_build = false

# ==============================================================================
#                              Memory Configuration
# ==============================================================================
[Memory]

# Zephyr chosen SRAM is OCRAM2. Keep this as the main QEMU RAM bank.
[Memory.main]
id = "ocram2"
base_address = "0x20200000"
memory_size = "512K"
memory_type = "SRAM"
backend = "file"
memory_file = "./fastdyn_qemu_memory/cerebri_rdd2_ocram2.bin"
share = true
prealloc = false

# DTCM is used by the linked image for Zephyr data/BSS and ENET DMA buffers.
[[Memory.dtcm]]
id = "dtcm"
index = 1
base_address = "0x20000000"
memory_size = "256K"
memory_type = "SRAM"
backend = "file"
memory_file = "./fastdyn_qemu_memory/cerebri_rdd2_dtcm.bin"
share = true
prealloc = false

# ITCM is part of the link layout; the ELF has an ITCM relocation segment.
[[Memory.itcm]]
id = "itcm"
index = 2
base_address = "0x00000000"
memory_size = "256K"
memory_type = "SRAM"
backend = "file"
memory_file = "./fastdyn_qemu_memory/cerebri_rdd2_itcm.bin"
share = true
prealloc = false

# XIP flash window used by MIMXRT1064/FlexSPI2. The ELF text and vector table
# live here, with _vector_table at 0x70002000.
[[Memory.xip_flash]]
id = "xip_flash"
index = 3
base_address = "0x70000000"
memory_size = "4M"
memory_type = "FLASH"
backend = "file"
memory_file = "./fastdyn_qemu_memory/cerebri_rdd2_xip_flash.bin"
share = true
prealloc = false

# ==============================================================================
#                                CPU Configuration
# ==============================================================================
[Machine]
platform = "MIMXRT1064"
# All runtime IRQs below are numeric. Static analysis explicitly loads the SVD,
# while mission runs skip its multi-second XML parse.
load_svd = false
qemu_path = "${FASTDYN_QEMU_PATH}"
enable_gdb = false
stop_on_start = false
launch_gdb = false
monitor_port = 5555
qmp_socket = "/tmp/rdd2_qmp.sock"
log_file = "qemu.log"
log_options = "none"
icount = { shift = 6, sleep = false, align = false }
semihosting = true
semihosting_config = "enable=on,target=native"
coverage = false
finline = "None"
print_command = true
reset_memory_files = true
ignore_functions = [
    "idle",
    "z_arm_cpu_idle",
    "arch_cpu_idle",
    "arch_cpu_atomic_idle",
]

[CPU]
[[CPU.cpu0]]
arch = "arm"
machine = "cortexm"
cpu = "cortex-m7"
plugin_library = "build/libfastdyn.so"
monitor_elf = "${FASTDYN_MONITOR_ELF}"
binary = "${RDD2_FASTDYN_BUILD_DIR}/zephyr/zephyr.elf"
symbol_file = "${RDD2_FASTDYN_BUILD_DIR}/zephyr/zephyr.elf"
init_nsvtor = "0x70002000"
twintrace = "None"
hardware_trace = "hardware_log/io.log"
introspect = false
optifuzz = false

logger_content = """
# --- Plugin Logger Configuration ---
# level = DEBUG
# output = stderr
"""

# ==============================================================================
#                              Device Configuration
# ==============================================================================

[Device.Models.elder]

[Device.Models.passthrough]
backend = "stlink"

[Device.Models.classic]

[Device.Models.twintrace]
backend = "stlink"

[Device.Models.unhandled]

# Peripheral entries are intentionally not pre-populated in this initial config.
# The first probe-run should use MIMXRT1064.svd to identify unhandled MMIO and
# append [Device.<peripheral>] blocks as the firmware reaches each dependency.


[Device.systemcontrol]
ranges = [["0xe000e000", "0xe000efac"]]
irq = [[1, 150]]
description = "SystemControl"
read_priority = "elder"
[[Device.systemcontrol.handlers]]
model = "elder"
enabled = true
scroll = "boardrunner/boardrunner_sdk/build/systemcontrol.so"
[[Device.systemcontrol.connections]]
type = "endpoint"
name = "gazebo"
enabled = false

