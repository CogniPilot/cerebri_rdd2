# ==============================================================================
#                      Firmware Lockstep Mission
# ==============================================================================
# The mission and FMI host are compiled Rust. The physics equations come from
# the Rumoca-generated RDD2 FMI 3 plant; Python is not in the hot path.
[Run.processes.cerebri_rdd2_mission]
command = [
    "${CEREBRI_RDD2_ROOT}/tools/fastdyn_mission/target/release/cerebri-rdd2-mission",
    "--duration",
    "${RDD2_FASTDYN_MISSION_DURATION_S:-20}",
    "--report",
    "${RDD2_FASTDYN_REPORT:-out/cerebri_rdd2_mission.json}",
    "--trajectory",
    "${RDD2_MISSION_TRAJECTORY:-out/mission-trajectory.csv}",
]
ready_message = "RDD2 mission runner connected"
terminate_run_on_exit = true

[Run.processes.cerebri_rdd2_mission.env]
RDD2_FASTDYN_SHARED_MEMORY = "${FASTDYN_QEMU_MEMORY_DIR:-./fastdyn_qemu_memory}/machine0_main_ocram2.bin"
RDD2_FASTDYN_FIRMWARE_ELF = "${RDD2_FASTDYN_BUILD_DIR}/zephyr/zephyr.elf"
RDD2_RUMOCA_PLANT_LIBRARY = "${RDD2_RUMOCA_PLANT_LIBRARY}"
RDD2_RUMOCA_PLANT_DESCRIPTION = "${RDD2_RUMOCA_PLANT_DESCRIPTION}"
RDD2_FASTDYN_PLANT_DT_S = "${RDD2_FASTDYN_PLANT_DT_S:-0.020}"
RDD2_FASTDYN_MIN_SPEEDUP = "${RDD2_FASTDYN_MIN_SPEEDUP:-10.0}"
