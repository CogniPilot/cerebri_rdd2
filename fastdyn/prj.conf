CONFIG_RDD2_FASTDYN=y
CONFIG_RDD2_LOCKSTEP=y
CONFIG_CSYN_ZENOH=n
CONFIG_CSYN_ZROS_BRIDGE=n
# The rehosted image has ample flash headroom; optimize the 1600 Hz controller
# for execution speed instead of code size.
CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_SIZE_OPTIMIZATIONS=n
CONFIG_COMPILER_OPT="-O3"

# QEMU supplies the CPU clock and does not emulate analog supply or PLL
# settling. src/fastdyn_board.c retains the 24 MHz SDK rate bookkeeping used by
# the Zephyr Ethernet driver without these hardware-only polling loops.
CONFIG_ADJUST_DCDC=n
CONFIG_INIT_ARM_PLL=n
CONFIG_INIT_ENET_PLL=n
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_TIMER_RANDOM_GENERATOR=y

# The CI image has no physical CRSF, ICM45686, FlexIO DSHOT, SD card, or
# interactive shell in its flight path. Removing them also keeps boot focused
# on the same fake-driver boundary exercised by native_sim.
CONFIG_INPUT_CRSF=n
CONFIG_INPUT_SHELL=n
CONFIG_INPUT_EVENT_DUMP=n
CONFIG_SENSOR_ASYNC_API=n
CONFIG_SENSOR_SHELL=n
CONFIG_SHELL=n
CONFIG_ZROS_SHELL=n
CONFIG_ZENOH_PICO_SHELL=n
CONFIG_NET_SHELL=n
CONFIG_FILE_SYSTEM_SHELL=n
CONFIG_DEVICE_SHELL=n
CONFIG_KERNEL_SHELL=n
CONFIG_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_LOG=n
CONFIG_FILE_SYSTEM=n
CONFIG_DISK_DRIVERS=n
CONFIG_NETWORKING=n
CONFIG_MDIO=n
CONFIG_GNSS=n
CONFIG_THREAD_MONITOR=n
CONFIG_THREAD_STACK_INFO=n
CONFIG_INIT_STACKS=n
CONFIG_THREAD_RUNTIME_STATS=n
