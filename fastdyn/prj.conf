# Complete application profile for the rehosted firmware. Build with
# CONF_FILE=fastdyn/prj.conf so the physical sensor, console, storage, and
# network profile is not selected for the direct lockstep image.
CONFIG_MAIN_STACK_SIZE=6144
CONFIG_MAIN_THREAD_PRIORITY=2
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_THREAD_NAME=y
CONFIG_FPU=y
CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_POLL=y
CONFIG_HEAP_MEM_POOL_SIZE=32768

CONFIG_INPUT=y
CONFIG_INPUT_MODE_SYNCHRONOUS=y
CONFIG_SENSOR=y
CONFIG_ZROS=y
CONFIG_CSYN=y

CONFIG_RDD2_FASTDYN=y
CONFIG_RDD2_LOCKSTEP=y

# Optimize the 1600 Hz controller for execution speed. QEMU supplies the CPU
# clock and does not emulate analog supply or PLL settling.
CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_SIZE_OPTIMIZATIONS=n
CONFIG_ADJUST_DCDC=n
CONFIG_INIT_ARM_PLL=n
CONFIG_INIT_ENET_PLL=n

# FastDyn supplies deterministic entropy for this test-only image.
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_TIMER_RANDOM_GENERATOR=y
